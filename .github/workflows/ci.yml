name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run when a newer push lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: GHC ${{ matrix.ghc }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        cabal:
          - latest
        ghc:
          - 9.6.7
          - 9.8.4
          - 9.10.3
          - 9.12.4
          - 9.14.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal-install
        id: setup-haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
          cabal-update: false

      # The cabal package index location varies by runner os.
      - name: Discover cabal paths
        id: cabal-paths
        # Force bash so `$GITHUB_OUTPUT` redirection works on Windows.
        shell: bash
        run: |
          echo "remote-repo-cache=$(cabal path --remote-repo-cache)" >> "$GITHUB_OUTPUT"

      # Cache the package index.
      - name: Cache Hackage package index
        uses: actions/cache@v4
        with:
          key: hackage-${{ runner.os }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            hackage-${{ runner.os }}-
          path: ${{ steps.cabal-paths.outputs.remote-repo-cache }}

      - name: cabal update
        run: cabal update

      - name: Configure
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build --dry-run all

      # Cache the cabal store dependency builds.
      - name: Restore cabal store cache
        id: cache-store
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: store-v2-${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-${{ hashFiles('**/*.cabal', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            store-v2-${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      # Project-local build artefacts.
      - name: Cache dist-newstyle
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: dist-${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-${{ hashFiles('**/*.cabal', 'cabal.project', 'cabal.project.freeze', '**/*.hs') }}
          restore-keys: |
            dist-${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=streaming

      - name: Haddock
        shell: bash
        run: |
          # Drop any extant tarballs that might no be writable.
          rm -f dist-newstyle/*-docs.tar.gz
          cabal haddock --haddock-for-hackage idna2008

      # Dependencies built now.
      - name: Save cabal store cache
        if: always() && steps.cache-store.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ steps.cache-store.outputs.cache-primary-key }}

      # Hackage-validity gates.
      - name: Cabal check
        run: cabal check

      - name: Build sdist
        run: cabal sdist
